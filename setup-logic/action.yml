name: 'Setup Logic'
description: ''

inputs:
  APP_NAME:
    description: 'App name'
    required: false
    default: ''
  NAMESPACE:
    description: 'App namespace'
    required: false
    default: ''

outputs:
  APP_NAME:
    description: 'App name'
    value: ${{ steps.setup.outputs.APP_NAME }}
  NAMESPACE:
    description: 'App namespace'
    value: ${{ steps.setup.outputs.NAMESPACE }}
  CALLER_REPO_NAME:
    description: "Only name of the repo itself"
    value: ${{ steps.setup.outputs.CALLER_REPO_NAME }}
  DEPLOY_RUNNER:
    description: "Runner for env deployment"
    value: ${{ steps.setup.outputs.DEPLOY_RUNNER }}
  EXTRA_TAG:
    description: "Extra tag for built image"
    value: ${{ steps.setup.outputs.EXTRA_TAG }}

runs:
  using: "composite"
  steps:
    - id: setup
      shell: bash
      run: |
        split=(${GITHUB_REPOSITORY//\// })
        
        echo "CALLER_REPO_NAME=${split[1]}" >> $GITHUB_OUTPUT

        if [ "${{ inputs.APP_NAME }}" == '' ]; then
          echo "APP_NAME=${split[1]}" >> $GITHUB_OUTPUT
          echo "APP_NAME=${split[1]}"
        else
          echo "APP_NAME=${{ inputs.APP_NAME }}" >> $GITHUB_OUTPUT
          echo "APP_NAME=${{ inputs.APP_NAME }}"
        fi

        if [ "${{ inputs.NAMESPACE }}" == '' ]; then
          echo "NAMESPACE=${split[1]}" >> $GITHUB_OUTPUT
          echo "NAMESPACE=${split[1]}"
        else
          echo "NAMESPACE=${{ inputs.NAMESPACE }}" >> $GITHUB_OUTPUT
          echo "NAMESPACE=${{ inputs.NAMESPACE }}"
        fi
        
        # check if this is a PR or not
        if [ ${GITHUB_EVENT_NAME} == 'pull_request' ]; then
        
          STRATEGY="PR-based"
        
          PR_N=$(echo "$GITHUB_REF_NAME" | awk -F / '{print $1}')
          EXTRA_TAG="pr-${split[1]}-${PR_N}"
          echo "EXTRA_TAG=${EXTRA_TAG}" >> $GITHUB_OUTPUT
          DEPLOY_RUNNER="apifornia-dev"
          echo "DEPLOY_RUNNER=${DEPLOY_RUNNER}" >> $GITHUB_OUTPUT
          OK="yes"
        else
          # okay not a PR
          # TAG based deployment ?
          if [ ${GITHUB_REF_TYPE} == 'tag' ]; then
          
            STRATEGY="tag-based"
                
            if [ ${GITHUB_REF_NAME} == 'dev' ]; then
            EXTRA_TAG="dev"
            echo "EXTRA_TAG=${EXTRA_TAG}" >> $GITHUB_OUTPUT
            DEPLOY_RUNNER="apifornia-dev"
            echo "DEPLOY_RUNNER=${DEPLOY_RUNNER}" >> $GITHUB_OUTPUT
            OK="yes"
          fi
          
          if [ ${GITHUB_REF_NAME} == 'prod' ]; then
            EXTRA_TAG="prod"
            echo "EXTRA_TAG=${EXTRA_TAG}" >> $GITHUB_OUTPUT
            DEPLOY_RUNNER="apifornia-prod"
            echo "DEPLOY_RUNNER=${DEPLOY_RUNNER}" >> $GITHUB_OUTPUT
            OK="yes"
            fi
          fi
          
          # BRANCH based deployment ?
          if [ ${GITHUB_REF_TYPE} == 'branch' ]; then
          
            STRATEGY="branch-based"
          
            if [ ${GITHUB_REF_NAME} == 'develop' ]; then
              EXTRA_TAG="dev"
              echo "EXTRA_TAG=${EXTRA_TAG}" >> $GITHUB_OUTPUT
              DEPLOY_RUNNER="apifornia-dev"
              echo "DEPLOY_RUNNER=${DEPLOY_RUNNER}" >> $GITHUB_OUTPUT
              OK="yes"
            fi
          fi
        fi

        if [ ${OK} == 'yes' ]; then
          echo "All good"
          echo "Strategy: ${STRATEGY}"
          echo "Extra tag: ${EXTRA_TAG}"
          echo "Runner: ${DEPLOY_RUNNER}"
        else
          echo "==========================================================================================="
          echo "ERROR: Unfortunately pr/tag/branch logic failed to selected needed deploy strategy and tag"
          echo "==========================================================================================="
          exit 1
        fi
